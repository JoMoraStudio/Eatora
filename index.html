<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: #262626;
    background:
      radial-gradient(circle at 15% 10%, rgba(180,229,162,0.9) 0%, rgba(180,229,162,0) 45%),
      radial-gradient(circle at 85% 15%, rgba(70,177,225,0.85) 0%, rgba(70,177,225,0) 50%),
      radial-gradient(circle at 50% 90%, rgba(192,79,21,0.35) 0%, rgba(192,79,21,0) 55%),
      linear-gradient(160deg, #eaf7f0 0%, #dff2fb 45%, #fdf6ee 100%);
    background-attachment: fixed;
  }

  .display-font { font-family: 'Fraunces', serif; }
  .mono-font { font-family: 'Space Mono', monospace; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(38,38,38,0.2); border-radius: 4px; }

  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 112px; }

  .glass {
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.32);
    box-shadow: 0 8px 32px rgba(38,38,38,0.12);
  }
  .glass-strong {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 8px 32px rgba(38,38,38,0.12);
  }
  .glass-dark {
    background: rgba(38,38,38,0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fffff0;
  }

  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .logo-tile {
    width: 48px; height: 48px; border-radius: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(155deg, rgba(255,255,240,0.55), rgba(255,255,255,0.25));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 6px 18px rgba(38,38,38,0.14), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .logo-tile img { width: 32px; height: 32px; object-fit: contain; }
  .header h1 { margin: 0; font-size: 20px; font-weight: 600; line-height: 1.1; }
  .header p { margin: 0; font-size: 11px; opacity: 0.6; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; padding: 4px; border-radius: 16px; }
  .tab-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0.65;
    transition: all 0.15s;
  }
  .tab-btn.active { opacity: 1; }

  .week-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 16px; margin-bottom: 16px; }
  .week-nav button { width: 32px; height: 32px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
  .week-nav button:active { transform: scale(0.9); }
  .week-label { text-align: center; }
  .week-label .label-text { font-size: 12px; font-weight: 700; }
  .week-label button { font-size: 10px; opacity: 0.6; text-decoration: underline; margin-top: 2px; }

  .day-list { display: flex; flex-direction: column; gap: 12px; }
  .day-card { border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; }
  .day-card.today { outline: 2px solid rgba(192,79,21,0.55); background: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.55); }
  .day-date { width: 48px; text-align: center; flex-shrink: 0; }
  .day-date .dow { font-size: 10px; text-transform: uppercase; opacity: 0.6; }
  .day-date .num { font-size: 18px; font-weight: 600; }
  .day-meal-btn {
    flex: 1; display: flex; align-items: center; gap: 12px; text-align: left;
    border-radius: 12px; padding: 6px; margin: -6px;
  }
  .day-thumb {
    width: 48px; height: 48px; border-radius: 12px; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.5);
  }
  .day-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .day-meal-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-meal-desc { font-size: 12px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-empty-btn { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 14px; opacity: 0.55; padding: 6px 0; }
  .day-clear { width: 28px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; opacity: 0.5; flex-shrink: 0; }

  .empty-state { border-radius: 16px; padding: 32px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 24px; }
  .empty-state p { font-size: 14px; opacity: 0.7; margin: 0; }

  .meals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .meal-card { border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
  .meal-photo { aspect-ratio: 1 / 1; width: 100%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.4); }
  .meal-photo img { width: 100%; height: 100%; object-fit: cover; }
  .meal-body { padding: 10px; flex: 1; display: flex; flex-direction: column; }
  .meal-name { font-weight: 600; font-size: 14px; line-height: 1.2; }
  .meal-desc { font-size: 12px; opacity: 0.6; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meal-actions { display: flex; gap: 6px; margin-top: 8px; }
  .meal-actions button { flex: 1; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 11px; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.4); }
  .meal-actions .del-btn { flex: 0 0 32px; }

  .fab {
    position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(38,38,38,0.35);
    font-size: 26px; line-height: 1;
  }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end; justify-content: center;
    background: rgba(38,38,38,0.45); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    padding: 0;
  }
  .modal-box {
    width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(26px); -webkit-backdrop-filter: blur(26px);
    border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 8px 32px rgba(38,38,38,0.12);
    animation: fadeIn 0.2s ease;
  }
  @media (min-width: 480px) {
    .modal-overlay { align-items: center; padding: 16px; }
    .modal-box { border-radius: 24px; }
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h2 { margin: 0; font-size: 18px; font-weight: 600; }
  .modal-close { width: 32px; height: 32px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: rgba(38,38,38,0.08); font-size: 16px; }

  .field-label { font-size: 11px; text-transform: uppercase; opacity: 0.55; font-family: 'Space Mono', monospace; }
  .text-input, .text-area {
    width: 100%; margin-top: 4px; padding: 10px 12px; border-radius: 12px; font-size: 14px; outline: none;
    background: rgba(255,255,255,0.55); border: 1px solid rgba(38,38,38,0.12);
  }
  .text-area { resize: none; }
  .char-count { font-size: 10px; opacity: 0.45; text-align: right; margin-top: 2px; }

  .photo-drop {
    width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.4); border: 1px dashed rgba(38,38,38,0.25);
  }
  .photo-drop img { width: 100%; height: 100%; object-fit: cover; }
  .photo-drop .hint { display: flex; flex-direction: column; align-items: center; gap: 6px; opacity: 0.55; font-size: 12px; }

  .primary-btn { width: 100%; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 500; margin-top: 4px; }
  .assign-row { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 12px; width: 100%; text-align: left; background: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .assign-row.selected { background: rgba(38,38,38,0.15); }
  .assign-row .thumb { width: 44px; height: 44px; border-radius: 8px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.5); }
  .assign-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .assign-list { max-height: 50vh; overflow-y: auto; padding-right: 4px; }

  .danger-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 500; color: white; background: rgba(192,79,21,0.9); }
  .cancel-btn { flex: 1; padding: 10px; border-radius: 12px; font-size: 14px; background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.35); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 10px 16px; border-radius: 12px; font-size: 14px; z-index: 60;

function saveMealsRemote(meal) {
  if (!docRef) { showToast("Keine Verbindung zur Datenbank"); return; }
  docRef.update({ [`meals.${meal.id}`]: meal }).catch(() => showToast("Speichern fehlgeschlagen"));
}
function deleteMealRemote(id) {
  if (!docRef) { showToast("Keine Verbindung zur Datenbank"); return; }
  const updates = { [`meals.${id}`]: firebase.firestore.FieldValue.delete() };
  Object.keys(state.plan).forEach(k => {
    if (state.plan[k] === id) updates[`weekplan.${k}`] = firebase.firestore.FieldValue.delete();
  });
  docRef.update(updates).catch(() => showToast("Löschen fehlgeschlagen"));
}
function setPlanRemote(dateKey, mealId) {
  if (!docRef) { showToast("Keine Verbindung zur Datenbank"); return; }
  const value = mealId === null ? firebase.firestore.FieldValue.delete() : mealId;
  docRef.update({ [`weekplan.${dateKey}`]: value }).catch(() => showToast("Speichern fehlgeschlagen"));
}

// ---------- date helpers ----------
const WEEKDAYS = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const MONTHS = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

function toISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function getMondayOfWeek(date, offset) {
  const d = new Date(date);
  d.setDate(d.getDate() + offset*7);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(offset) {
  const monday = getMondayOfWeek(new Date(), offset);
  return Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(d.getDate()+i); return d; });
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function compressImage(file, maxWidth = 480, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Bild konnte nicht geladen werden"));
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => { el.style.display = "none"; }, 2200);
}

  calendar: `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
};

// ---------- render ----------
function render() {
  const app = document.getElementById("app");

  if (!firebaseReady || firebaseError) {
    app.innerHTML = `
      <div class="header">
        <div class="logo-tile"><img src="${LOGO_SRC}" alt="Eatora Logo" /></div>
        <div><h1 class="display-font">Eatora</h1></div>
      </div>
      <div class="empty-state glass">
        <p><strong>Keine Verbindung zur Datenbank.</strong></p>
        <p>Trage deine Firebase-Konfiguration im Quellcode (Bereich "firebaseConfig") ein und prüfe die Datenbank-Regeln.</p>
      </div>
    `;
    return;
  }

  if (state.loadingData) {
    app.innerHTML = `
      <div class="header">
        <div class="logo-tile"><img src="${LOGO_SRC}" alt="Eatora Logo" /></div>
        <div><h1 class="display-font">Eatora</h1></div>
      </div>
      <div style="text-align:center;padding:60px 0;opacity:0.5;font-size:14px">Lädt…</div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="header">
      <div class="logo-tile"><img src="${LOGO_SRC}" alt="Eatora Logo" /></div>
      <div>
        <h1 class="display-font">Eatora</h1>
        <p class="mono-font">Mittagsgerichte planen</p>
      </div>
    </div>

    <div class="tabs glass">
      <button class="tab-btn ${state.tab==='plan' ? 'active glass-dark' : ''}" data-action="tab" data-tab="plan">
        ${ICON.calendar} Wochenplan
      </button>
      <button class="tab-btn ${state.tab==='meals' ? 'active glass-dark' : ''}" data-action="tab" data-tab="meals">
        ${ICON.fork} Meine Gerichte
      </button>
    </div>

    <div id="view"></div>
  `;

  renderView();

  if (state.tab === "meals") {
    const fab = document.createElement("button");
    fab.className = "fab glass-dark";
    fab.innerHTML = ICON.plus;
    fab.onclick = () => openMealEditor({});
    app.appendChild(fab);
  }

  bindGlobalActions();
  renderModals();
}

function renderView() {
  const view = document.getElementById("view");
  if (state.tab === "plan") view.innerHTML = renderPlan();
  else view.innerHTML = renderMeals();
  bindViewActions();
}

function weekLabel() {
  const dates = getWeekDates(state.weekOffset);
  const first = dates[0], last = dates[6];
  const sameMonth = first.getMonth() === last.getMonth();
  const firstStr = `${first.getDate()}. ${sameMonth ? "" : MONTHS[first.getMonth()]}`.trim();
  const lastStr = `${last.getDate()}. ${MONTHS[last.getMonth()]}`;
  return `${firstStr} – ${lastStr} ${last.getFullYear()}`;
}

function renderPlan() {
  const dates = getWeekDates(state.weekOffset);
  const todayKey = toISODate(new Date());

  const days = dates.map((date, i) => {
    const dateKey = toISODate(date);
    const mealId = state.plan[dateKey];
    const meal = mealId ? mealById(mealId) : null;
    const isToday = dateKey === todayKey;

    const content = meal ? `
      <button class="day-meal-btn" data-action="assign" data-day="${dateKey}">
        <div class="day-thumb">${meal.photo ? `<img src="${meal.photo}" alt="">` : ICON.fork}</div>
        <div style="min-width:0">
          <div class="day-meal-name">${escapeHtml(meal.name)}</div>
          ${meal.description ? `<div class="day-meal-desc">${escapeHtml(meal.description)}</div>` : ""}
        </div>
      </button>
      <button class="day-clear" data-action="clear" data-day="${dateKey}">${ICON.x}</button>
    ` : `
      <button class="day-empty-btn" data-action="assign" data-day="${dateKey}">${ICON.plus} Gericht wählen</button>
    `;

    return `
      <div class="day-card glass ${isToday ? 'today' : ''}">
        <div class="day-date">
          <div class="dow mono-font">${WEEKDAYS[i].slice(0,2)}</div>
          <div class="num display-font">${date.getDate()}</div>
        </div>
        ${content}
      </div>
    `;
  }).join("");

  return `
    <div class="week-nav glass">
      <button data-action="week" data-dir="-1">${ICON.chevronLeft}</button>
      <div class="week-label">
        <div class="label-text mono-font">${weekLabel()}</div>
        ${state.weekOffset !== 0 ? `<button data-action="week-reset">zur aktuellen Woche</button>` : ""}
      </div>
      <button data-action="week" data-dir="1">${ICON.chevronRight}</button>
    </div>
    <div class="day-list">${days}</div>
  `;
}

function renderMeals() {
  if (state.meals.length === 0) {
    return `
      <div class="empty-state glass">
        <div class="opacity-40">${ICON.fork}</div>
        <p>Noch keine Gerichte angelegt.</p>
        <button class="primary-btn glass-dark" style="width:auto;padding:10px 16px" data-action="add-meal">Erstes Gericht erstellen</button>
      </div>
    `;
  }
  const cards = state.meals.map(m => `
    <div class="meal-card glass">
      <div class="meal-photo">${m.photo ? `<img src="${m.photo}" alt="">` : ICON.fork}</div>
      <div class="meal-body">
        <div class="meal-name">${escapeHtml(m.name)}</div>
        ${m.description ? `<div class="meal-desc">${escapeHtml(m.description)}</div>` : ""}
        <div class="meal-actions">
          <button data-action="edit-meal" data-id="${m.id}">${ICON.pencil} Bearbeiten</button>
          <button class="del-btn" data-action="delete-meal" data-id="${m.id}">${ICON.trash}</button>
        </div>
      </div>
    </div>
  `).join("");
  return `<div class="meals-grid">${cards}</div>`;
}

// ---------- modals ----------
function renderModals() {
  let host = document.getElementById("modal-host");
  if (!host) {
    host = document.createElement("div");
    host.id = "modal-host";
    document.body.appendChild(host);
  }
  host.innerHTML = "";

  if (state.assignDay) host.appendChild(buildAssignModal());
  if (state.editingMeal) host.appendChild(buildMealEditor());
  if (state.confirmDeleteId) host.appendChild(buildConfirmDelete());
}

function modalShell(title, bodyHtml, onCloseAction) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-head">
        <h2 class="display-font">${title}</h2>
        <button class="modal-close" data-action="${onCloseAction}">${ICON.x}</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
    </div>
  `;
  overlay.addEventListener("click", (e) => { if (e.target === overlay) dispatch(onCloseAction); });
  overlay.querySelector(".modal-close").addEventListener("click", () => dispatch(onCloseAction));
  return overlay;
}

function buildAssignModal() {
  const dateKey = state.assignDay;
  const dateObj = new Date(dateKey + "T00:00:00");
  const title = `${WEEKDAYS[(dateObj.getDay()+6)%7]}, ${dateObj.getDate()}. ${MONTHS[dateObj.getMonth()]}`;
  const current = state.plan[dateKey];

  let list;
  if (state.meals.length === 0) {
    list = `<div style="text-align:center;padding:32px 0;opacity:0.6;font-size:14px">Du hast noch keine Gerichte. Erstelle zuerst eins.</div>`;
  } else {
    list = `<div class="assign-list">` + state.meals.map(m => `
      <button class="assign-row ${current === m.id ? 'selected' : ''}" data-action="choose-meal" data-id="${m.id}">
        <div class="thumb">${m.photo ? `<img src="${m.photo}" alt="">` : ICON.fork}</div>
        <div style="min-width:0">
          <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(m.name)}</div>
          ${m.description ? `<div style="font-size:12px;opacity:0.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(m.description)}</div>` : ""}
        </div>
      </button>
    `).join("") + `</div>`;
  }

  const body = `
    ${list}
    <button class="primary-btn glass-dark" data-action="create-from-assign" style="display:flex;align-items:center;justify-content:center;gap:6px">${ICON.plus} Neues Gericht erstellen</button>
  `;
  const el = modalShell(title, body, "close-assign");

  el.querySelectorAll('[data-action="choose-meal"]').forEach(btn => {
    btn.addEventListener("click", () => chooseMeal(dateKey, btn.dataset.id));
  });
  el.querySelector('[data-action="create-from-assign"]').addEventListener("click", () => {
    state.assignAfterSave = dateKey;
    state.assignDay = null;
    state.editingMeal = {};
    render();
  });
  return el;
}

function buildMealEditor() {
  const meal = state.editingMeal;
  const isEdit = !!meal.id;
  const photo = state.photoDraft !== null ? state.photoDraft : (meal.photo || null);

  const body = `
    <div class="photo-drop" data-action="pick-photo">
      ${photo ? `<img src="${photo}" alt="">` : `<div class="hint">${ICON.camera}<span id="photo-hint">Foto hinzufügen</span></div>`}
    </div>
    <input type="file" accept="image/*" id="photo-input" style="display:none" />

    <div style="margin-top:12px">
      <div class="field-label">Name</div>
      <input class="text-input" id="meal-name-input" placeholder="z. B. Linsensuppe" value="${escapeHtml(meal.name || "")}" />
    </div>

    <div style="margin-top:12px">
      <div class="field-label">Kurze Beschreibung</div>
      <textarea class="text-area" id="meal-desc-input" rows="2" placeholder="z. B. mit Möhren, Kartoffeln, Räuchertofu">${escapeHtml(meal.description || "")}</textarea>
      <div class="char-count"><span id="char-count-num">${(meal.description||"").length}</span>/140</div>
    </div>

    <button class="primary-btn glass-dark" id="save-meal-btn">Speichern</button>
  `;

  const el = modalShell(isEdit ? "Gericht bearbeiten" : "Neues Gericht", body, "close-editor");

  const fileInput = el.querySelector("#photo-input");
  el.querySelector(".photo-drop").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const hint = el.querySelector("#photo-hint");
    if (hint) hint.textContent = "Wird verarbeitet…";
    try {
      const dataUrl = await compressImage(file);
      state.photoDraft = dataUrl;
      renderModals();
    } catch {
      showToast("Foto konnte nicht verarbeitet werden");
    }
  });

  const descInput = el.querySelector("#meal-desc-input");
  descInput.addEventListener("input", () => {
    descInput.value = descInput.value.slice(0, 140);
    el.querySelector("#char-count-num").textContent = descInput.value.length;
  });

  el.querySelector("#save-meal-btn").addEventListener("click", () => {
    const name = el.querySelector("#meal-name-input").value.trim();
    if (!name) { showToast("Bitte einen Namen eingeben"); return; }
    const description = descInput.value.trim().slice(0, 140);
    const finalPhoto = state.photoDraft !== null ? state.photoDraft : (meal.photo || null);
    saveMeal({
      id: meal.id || uid(),
      name,
      description,
      photo: finalPhoto,
      createdAt: meal.createdAt || Date.now(),
    });
  });

  return el;
}

function buildConfirmDelete() {
  const body = `
    <p style="font-size:14px;opacity:0.7;margin:0 0 16px">Das Gericht wird auch aus dem Wochenplan entfernt, falls es dort eingetragen ist.</p>
    <div style="display:flex;gap:8px">
      <button class="cancel-btn" data-action="cancel-delete">Abbrechen</button>
      <button class="danger-btn" data-action="confirm-delete">Löschen</button>
    </div>
  `;
  const el = modalShell("Gericht löschen?", body, "cancel-delete");
  el.querySelector('[data-action="cancel-delete"]').addEventListener("click", () => { state.confirmDeleteId = null; renderModals(); });
  el.querySelector('[data-action="confirm-delete"]').addEventListener("click", () => deleteMeal(state.confirmDeleteId));
  return el;
}

// ---------- actions ----------
function dispatch(action) {
  if (action === "close-assign") { state.assignDay = null; renderModals(); }
  if (action === "close-editor") { state.editingMeal = null; state.photoDraft = null; state.assignAfterSave = null; renderModals(); }
  if (action === "cancel-delete") { state.confirmDeleteId = null; renderModals(); }
}

function chooseMeal(dateKey, mealId) {
  setPlanRemote(dateKey, mealId);
  state.assignDay = null;
  render();
}

function clearDay(dateKey) {
  setPlanRemote(dateKey, null);
  render();
}

function openMealEditor(meal) {
  state.editingMeal = meal;
  state.photoDraft = null;
  render();
}

function saveMeal(meal) {
  const exists = state.meals.some(m => m.id === meal.id);
  saveMealsRemote(meal);

  if (state.assignAfterSave) {
    setPlanRemote(state.assignAfterSave, meal.id);
  }

  state.editingMeal = null;
  state.photoDraft = null;
  state.assignAfterSave = null;
  render();
  showToast(exists ? "Gericht aktualisiert" : "Gericht erstellt");
}

function deleteMeal(id) {
  deleteMealRemote(id);
  state.confirmDeleteId = null;
  render();
  showToast("Gericht gelöscht");
}

function bindGlobalActions() {
  document.querySelectorAll('[data-action="tab"]').forEach(btn => {
    btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); });
  });
}

function bindViewActions() {
  const view = document.getElementById("view");
  if (!view) return;

  view.querySelectorAll('[data-action="assign"]').forEach(btn => {
    btn.addEventListener("click", () => { state.assignDay = btn.dataset.day; render(); });
  });
  view.querySelectorAll('[data-action="clear"]').forEach(btn => {
    btn.addEventListener("click", () => clearDay(btn.dataset.day));
  });
  view.querySelectorAll('[data-action="week"]').forEach(btn => {
    btn.addEventListener("click", () => { state.weekOffset += Number(btn.dataset.dir); render(); });
  });
  const resetBtn = view.querySelector('[data-action="week-reset"]');
  if (resetBtn) resetBtn.addEventListener("click", () => { state.weekOffset = 0; render(); });

  view.querySelectorAll('[data-action="add-meal"]').forEach(btn => {
    btn.addEventListener("click", () => openMealEditor({}));
  });
  view.querySelectorAll('[data-action="edit-meal"]').forEach(btn => {
    btn.addEventListener("click", () => openMealEditor(mealById(btn.dataset.id)));
  });
  view.querySelectorAll('[data-action="delete-meal"]').forEach(btn => {
    btn.addEventListener("click", () => { state.confirmDeleteId = btn.dataset.id; renderModals(); });
  });
}
